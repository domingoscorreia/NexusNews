{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-form">
        <h2>Criar Conta</h2>
        <form action="{{ url_for('auth.register') }}" method="post">
            <div class="form-group">
                <label for="username">Nome de Utilizador</label>
                <input type="text" id="username" name="username" placeholder="Seu Nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Criar Perfil IA</button>
        </form>
        <p style="text-align: center; margin-top: 30px; font-size: 0.85rem; color: #666;">
            Já tem conta? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Faça Login</a>
        </p>
    </div>
</div>
{% endblock %}
