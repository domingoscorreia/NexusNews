{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-form">
        <h2>Entrar</h2>
        <form action="{{ url_for('auth.login') }}" method="post">
            <div class="form-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Aceder ao Feed</button>
        </form>
        <p style="text-align: center; margin-top: 30px; font-size: 0.85rem; color: #666;">
            Não tem conta? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Registe-se aqui</a>
        </p>
    </div>
</div>
{% endblock %}
